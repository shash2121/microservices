<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - ShopHub</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">
  <nav class="navbar">
    <div class="container">
      <a href="/" class="nav-brand">🛒 ShopHub</a>
      <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/login" class="btn btn-outline">Login</a>
      </div>
    </div>
  </nav>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Create Account</h1>
        <p>Join ShopHub for the best shopping experience</p>
      </div>

      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required placeholder="John Doe">
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="At least 6 characters" minlength="6">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="terms" required>
            <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
          </label>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <button type="submit" class="btn btn-primary btn-block btn-large">
          Create Account
        </button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="/login">Login</a>
      </p>
    </div>
  </main>

  <footer class="footer-simple">
    <p>&copy; 2026 ShopHub. All rights reserved.</p>
  </footer>

  <script src="/js/signup.js"></script>
</body>
</html>
