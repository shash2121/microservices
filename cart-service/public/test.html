<!DOCTYPE html>
<html>
<head>
  <title>Cart API Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
    .log { background: #16213e; padding: 10px; margin: 10px 0; border-radius: 5px; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #4f46e5; color: white; border: none; border-radius: 5px; }
    pre { background: #0f172a; padding: 10px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Cart API Test</h1>
  <div>
    <button onclick="testGetCart()">Test GET Cart</button>
    <button onclick="testAddItem()">Test ADD Item</button>
    <button onclick="clearLog()">Clear Log</button>
  </div>
  <div id="log"></div>

  <script>
    const API_BASE = 'http://localhost:3002/api/cart';
    const USER_ID = localStorage.getItem('shophub_userId') || 'test_user_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('shophub_userId', USER_ID);

    function log(msg, data = null, isError = false) {
      const div = document.createElement('div');
      div.className = 'log ' + (isError ? 'error' : 'success');
      div.innerHTML = `<strong>${msg}</strong><br>USER_ID: ${USER_ID}` + (data ? `<pre>${JSON.stringify(data, null, 2)}</pre>` : '');
      document.getElementById('log').appendChild(div);
    }

    async function testGetCart() {
      try {
        log('Fetching cart...');
        const response = await fetch(`${API_BASE}/${USER_ID}`);
        const data = await response.json();
        log('GET Cart Response:', data);
      } catch (err) {
        log('GET Cart Error:', err.message, true);
      }
    }

    async function testAddItem() {
      try {
        log('Adding item to cart...');
        const response = await fetch(`${API_BASE}/${USER_ID}/items`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            productId: 'test-123',
            name: 'Test Product',
            price: 99.99,
            image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500',
            quantity: 1
          })
        });
        const data = await response.json();
        log('ADD Item Response:', data);
      } catch (err) {
        log('ADD Item Error:', err.message, true);
      }
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    // Auto-run on load
    window.onload = () => {
      log('Page loaded. Click buttons to test API.');
    };
  </script>
</body>
</html>
