version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shophub_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: shophub
      MYSQL_USER: shophub_user
      MYSQL_PASSWORD: shophub_pass
    ports:
      - "3306:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql
    networks:
      - shophub_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  landing-service:
    image: sha2121/shophub-landing-page:1
    container_name: shophub_landing
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: development
      JWT_SECRET: shophub-jwt-secret-key-change-in-production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: shophub_user
      DB_PASSWORD: shophub_pass
      DB_NAME: shophub
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shophub_network

  catalog-service:
    build: ./catalog-service
    container_name: shophub_catalog
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    networks:
      - shophub_network

  cart-service:
    image: sha2121/shophub-cart:1
    container_name: shophub_cart
    restart: unless-stopped
    environment:
      PORT: 3002
      NODE_ENV: development
    ports:
      - "3002:3002"
    networks:
      - shophub_network

  checkout-service:
    image: sha2121/shophub-checkout:3
    container_name: shophub_checkout
    restart: unless-stopped
    environment:
      PORT: 3003
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: shophub_user
      DB_PASSWORD: shophub_pass
      DB_NAME: shophub
    ports:
      - "3003:3003"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shophub_network

networks:
  shophub_network:
    driver: bridge

volumes:
  mysql_data:
